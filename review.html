<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Review</title>

<meta name="description" content="Submit a product review form with ratings and feedback.">
<meta name="author" content="Joel Talemwa">

<link rel="stylesheet" href="styles/form.css">

<script src="scripts/form.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>

<form method="get" action="review.html">

<!-- PRODUCT -->
<label for="product">Product Name *</label>
<select id="product" name="product" required>
  <option value="" disabled selected>Select a Product ...</option>
</select>

<!-- RATING -->
<fieldset>
  <legend>Overall Rating (Required)</legend>

  <input type="radio" id="star1" name="rating" value="1" required>
  <label for="star1">☆</label>

  <input type="radio" id="star2" name="rating" value="2" required>
  <label for="star2">☆☆</label>

  <input type="radio" id="star3" name="rating" value="3" required>
  <label for="star3">☆☆☆</label>

  <input type="radio" id="star4" name="rating" value="4" required>
  <label for="star4">☆☆☆☆</label>

  <input type="radio" id="star5" name="rating" value="5" required>
  <label for="star5">☆☆☆☆☆</label>

</fieldset>

<!-- DATE -->
<label for="installDate">Date of Installation *</label>
<input type="date" id="installDate" name="installDate" required>

<!-- FEATURES -->
<fieldset>
  <legend>Useful Features</legend>

  <input type="checkbox" id="feature1" name="features" value="durability">
  <label for="feature1">Durability</label>

  <input type="checkbox" id="feature2" name="features" value="performance">
  <label for="feature2">Performance</label>

  <input type="checkbox" id="feature3" name="features" value="design">
  <label for="feature3">Design</label>

  <input type="checkbox" id="feature4" name="features" value="value">
  <label for="feature4">Value for Money</label>

</fieldset>

<!-- REVIEW -->
<label for="review">Written Review</label>
<textarea id="review" name="review"></textarea>

<!-- NAME -->
<label for="username">Your Name</label>
<input type="text" id="username" name="username">

<!-- SUBMIT -->
<input type="submit" value="Submit Review">

</form>

</main>

<footer>
  <p>© <span id="year"></span> Joel Talemwa 🌍 Uganda</p>
  <p id="lastModified"></p>
</footer>

</body>
</html>
