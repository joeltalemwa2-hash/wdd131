<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uganda Country Page</title>

<meta name="description" content="Explore Uganda, the Pearl of Africa, with its rich culture, wildlife, climate, and natural beauty.">

<link rel="stylesheet" href="styles/place.css">
<script src="scripts/place.js" defer></script>

</head>

<body>

<header>
<h1>Uganda</h1>
</header>

<!-- HERO IMAGE (REQUIRED SRCSET) -->
<picture>
<source srcset="images/uganda-large.webp" media="(min-width: 768px)">
<source srcset="images/uganda-medium.webp" media="(min-width: 500px)">
<img src="images/uganda-small.webp" alt="Uganda Landscape">
</picture>

<main>

<section class="info">
<h2>About Uganda</h2>
<p>Uganda, known as the Pearl of Africa, is famous for its wildlife, lakes, and diverse culture.</p>
</section>

<section class="weather">
<h2>Weather</h2>

<!-- SVG ICON (MOBILE ONLY) -->
<img src="images/weather.svg" alt="Weather icon" class="weather-icon">

<p>Temperature: <span id="temp">8</span>°C</p>
<p>Wind Speed: <span id="speed">10</span> km/h</p>
<p>Wind Chill: <span id="windchill"></span></p>

</section>

</main>

<footer>
<p>© <span id="year"></span> Joel Talemwa</p>
<p>Last Modified: <span id="modified"></span></p>
</footer>

</body>
</html>
